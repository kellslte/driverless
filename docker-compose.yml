version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: driverless-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: driverless
      POSTGRES_USER: driverless
      POSTGRES_PASSWORD: driverless_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U driverless']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: driverless-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
